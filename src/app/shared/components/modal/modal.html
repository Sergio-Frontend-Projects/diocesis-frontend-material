@if (isOpen()) {
  <div
    @fadeIn
    class="modal-container"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="ariaLabelId()"
  >
    <div
      class="backdrop"
      (click)="handleOverlayClick()"
      aria-hidden="true"
      role="presentation"
    ></div>

    <div [class]="containerClasses()" @scaleIn>
      <h2 [id]="ariaLabelId()" class="modal-title">{{ title() }}</h2>

      <div role="document">
        <ng-content />
      </div>

      @if (showActions()) {
        <div class="mt-6 flex gap-6" role="group" aria-label="Acciones del modal">
          <button
            type="button"
            (click)="cancel.emit()"
            [disabled]="loading()"
            class="modal-cancel-button"
            [class.opacity-50]="loading()"
            [attr.aria-label]="'Cancelar: ' + cancelText()"
          >
            {{ cancelText() }}
          </button>
          <button
            type="button"
            (click)="confirm.emit()"
            [disabled]="loading() || confirmDisabled()"
            class="modal-save-button"
            [class.opacity-50]="loading() || confirmDisabled()"
            [attr.aria-label]="loading() ? loadingText() : confirmText()"
          >
            {{ loading() ? loadingText() : confirmText() }}
          </button>
        </div>
      }
    </div>
  </div>
}
