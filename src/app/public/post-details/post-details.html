@if (post(); as article) {
  <article class="container mx-auto max-w-4xl px-4 py-8">
    <!-- Imagen principal -->
    @if (article.picture) {
      <div class="mb-8 overflow-hidden rounded-lg shadow-xl">
        <img
          [src]="article.picture | cleanUrl"
          [alt]="article.title"
          class="h-auto w-full object-cover"
        />
      </div>
    }

    <!-- Título -->
    <h1 class="text-custom-brown mb-4 text-4xl font-bold lg:text-5xl">
      {{ article.title }}
    </h1>

    <!-- Metadata -->
    <div class="mb-6 flex flex-wrap items-center gap-4 border-b border-gray-200 pb-4">
      <time class="text-custom-brown/70 text-sm">
        {{ article.createdAt | date: 'dd/MM/yyyy' }}
      </time>

      <!-- Tags -->
      @if (article.tags.length > 0) {
        <div class="flex flex-wrap gap-2">
          @for (tag of article.tags; track tag) {
            <span
              class="bg-custom-yellow/20 text-custom-brown rounded-full px-3 py-1 text-xs font-bold"
            >
              {{ tag }}
            </span>
          }
        </div>
      }
    </div>

    <!-- Botones de compartir -->
    <div class="mb-8 flex flex-wrap gap-3">
      <button
        type="button"
        (click)="shareOnWhatsApp()"
        class="hover:bg-custom-brown/10 flex items-center gap-2 rounded-lg border border-gray-200 px-4 py-2 transition-colors"
        aria-label="Compartir en WhatsApp"
      >
        <img src="/svgs/whatsapp.svg" alt="WhatsApp" class="h-5 w-5" />
        <span class="text-sm font-bold">WhatsApp</span>
      </button>

      <button
        type="button"
        (click)="shareOnTwitter()"
        class="hover:bg-custom-brown/10 flex items-center gap-2 rounded-lg border border-gray-200 px-4 py-2 transition-colors"
        aria-label="Compartir en Twitter"
      >
        <img src="/svgs/twitter.svg" alt="Twitter" class="h-5 w-5" />
        <span class="text-sm font-bold">Twitter</span>
      </button>

      <button
        type="button"
        (click)="shareOnFacebook()"
        class="hover:bg-custom-brown/10 flex items-center gap-2 rounded-lg border border-gray-200 px-4 py-2 transition-colors"
        aria-label="Compartir en Facebook"
      >
        <img src="/svgs/facebook.svg" alt="Facebook" class="h-5 w-5" />
        <span class="text-sm font-bold">Facebook</span>
      </button>

      <button
        type="button"
        (click)="copyLink()"
        class="hover:bg-custom-brown/10 flex items-center gap-2 rounded-lg border border-gray-200 px-4 py-2 transition-colors"
        aria-label="Copiar enlace"
      >
        <lucide-angular [img]="iconsService.copy" [size]="20" />
        <span class="text-sm font-bold">Copiar enlace</span>
      </button>
    </div>

    <!-- Contenido -->
    <div class="text-custom-brown prose prose-lg max-w-none">
      <p class="text-lg leading-relaxed whitespace-pre-wrap">
        {{ article.content }}
      </p>
    </div>

    <!-- Botón volver -->
    <div class="mt-12 border-t border-gray-200 pt-8">
      <a
        routerLink="/"
        class="bg-custom-brown hover:bg-custom-brown/80 inline-flex items-center gap-2 rounded-lg px-6 py-3 text-white transition-colors"
      >
        <lucide-angular [img]="iconsService.previous" [size]="20" />
        <span>Volver a inicio</span>
      </a>
    </div>
  </article>
} @else {
  <div class="container mx-auto flex min-h-96 items-center justify-center px-4">
    <p class="text-custom-brown text-lg font-medium">Cargando noticia...</p>
  </div>
}
