<div class="layout-container">
  <aside
    class="layout-aside lg:translate-x-0"
    [class.-translate-x-full]="!open()"
    role="navigation"
  >
    <div class="flex h-full flex-col overflow-hidden">
      <header class="shrink-0 border-b border-black/30 px-5 py-2 sm:py-4">
        <h1 class="text-2xl font-semibold tracking-tight">Diócesis de Ciudad Obregón</h1>
        <p class="mt-1 text-xs font-semibold text-black/60">Panel de administración</p>
      </header>

      <nav class="min-h-0 flex-1 space-y-1 overflow-y-auto p-2 sm:p-3">
        @for (item of items(); track item.to) {
          <a
            [routerLink]="item.to"
            routerLinkActive="bg-black/10"
            class="layout-button"
            (click)="closeOnNavigate()"
          >
            <div class="flex items-start gap-3">
              <lucide-icon [img]="item.icon" size="18" />
              <span class="align-middle">{{ item.label }}</span>
            </div>
          </a>
        }
      </nav>

      <footer class="shrink-0 border-t border-black/30 px-5 py-2 sm:py-4">
        <button class="layout-logout-button" (click)="logout()">
          <div class="flex items-center justify-center gap-2">
            <span>Cerrar sesión</span>
            <lucide-icon [img]="iconsService.logout" size="18" class="mr-2 inline align-middle" />
          </div>
        </button>
      </footer>
    </div>
  </aside>

  @if (open()) {
    <div
      class="fixed inset-0 z-30 bg-black/40 lg:hidden"
      (click)="toggle()"
      role="presentation"
    ></div>
  }

  <div class="flex h-dvh flex-1 flex-col overflow-y-auto lg:ml-72">
    <header class="bg-custom-brown sticky top-0 z-20 border-b border-black/30 backdrop-blur">
      <div class="flex h-14 min-w-0 items-center justify-between gap-3 px-4">
        <div class="flex min-w-0 flex-1 items-center gap-3 overflow-x-auto">
          <button class="btn-secondary shrink-0 lg:hidden" (click)="toggle()">
            <lucide-icon [img]="iconsService.menu" size="18" class="text-custom-yellow" />
          </button>
        </div>

        <!-- USUARIO ACTIVO -->
        <div class="flex shrink-0 items-center gap-2 sm:gap-4">
          <div class="flex min-w-0 items-center gap-2">
            <span
              class="hidden max-w-32 overflow-hidden text-sm text-ellipsis whitespace-nowrap text-white sm:inline md:max-w-44 lg:max-w-60"
            >
              {{ authService.user()?.username }}
            </span>

            <role-badge [role]="authService.user()?.role || 'Cargando...'" />
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 p-4" role="main">
      <router-outlet />
    </main>
  </div>
</div>
