<div class="section-spacing">
  <div class="page-header">
    <app-title title="Colonia" description="Administra las colonias del sistema" />

    <div class="actions-bar">
      <button class="btn-primary btn-full" (click)="openCreateColony()">
        <div class="flex items-center justify-center gap-2">
          <lucide-icon [img]="iconsService.add" size="15" color="black" aria-hidden="true" />
          <span>Crear Colonia</span>
        </div>
      </button>
    </div>
  </div>

  <div class="search-bar">
    <div class="flex items-center gap-2">
      <label for="search-colonies" class="sr-only">Buscar colonias por nombre</label>
      <lucide-icon
        [img]="iconsService.search"
        size="15"
        color="black"
        aria-hidden="true"
      ></lucide-icon>
      <input
        id="search-users"
        type="search"
        placeholder="Buscar por nombre..."
        [value]="search()"
        (input)="updateSearch($event)"
        class="input-search"
        aria-label="Buscar decanatos por nombre"
      />
    </div>

    <select
      id="filter-status"
      [value]="activeFilterValue()"
      (change)="updateFilterActive($event)"
      class="select-full"
      aria-label="Filtrar por estado"
    >
      <option class="font-bold" value="">Todos</option>
      <option class="font-bold" value="true">Activos</option>
      <option class="font-bold" value="false">Inactivos</option>
    </select>
  </div>

  @if (coloniesService.colonies().length > 0) {
    <div class="table-container">
      <table class="min-w-200 table-fixed">
        <thead class="bg-neutral-50 text-neutral-600">
          <tr>
            <th class="w-1/3 px-4 py-3 text-left font-bold">Nombre</th>
            <th class="w-1/3 px-4 py-3 text-left font-bold">Estado</th>
            <th class="px-4 py-3 text-right font-bold">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (row of coloniesService.colonies(); track row.id) {
            <tr
              class="animate-fade-in animate-duration-300 hover:bg-custom-yellow/50 border-t border-black/5 transition-all"
            >
              <td class="w-1/3 truncate px-4 py-3" [title]="row.name">{{ row.name }}</td>
              <td class="w-28 px-4 py-3">
                <div
                  class="inline-flex items-center gap-2 rounded-full border px-2 py-1 text-xs"
                  [class]="
                    row.isActive
                      ? 'border-green-200 bg-green-100 text-green-800'
                      : 'border-red-200 bg-red-100 text-red-800'
                  "
                >
                  <lucide-icon
                    [img]="row.isActive ? iconsService.active : iconsService.inactive"
                    size="20"
                    [color]="row.isActive ? 'green' : 'red'"
                  ></lucide-icon>

                  <span class="">
                    {{ row.isActive ? 'Activo' : 'Inactivo' }}
                  </span>
                </div>
              </td>
              <td class="py3 px-4">
                <div class="flex flex-wrap items-center justify-end gap-2">
                  <button class="btn-table-warning" (click)="openEditColony(row)">
                    <div class="flex items-center justify-center gap-1">
                      <lucide-icon [img]="iconsService.edit" size="15" />
                      <span class="hidden text-xs 2xl:inline"> Editar </span>
                    </div>
                  </button>
                  <button
                    class="btn-table"
                    [class]="
                      !row.isActive
                        ? 'border-green-200 bg-green-100 text-green-800'
                        : 'border-red-200 bg-red-100 text-red-800'
                    "
                    (click)="confirmToggleColony(row, row.isActive ? 'deactivate' : 'activate')"
                    [attr.aria-label]="
                      (row.isActive ? 'Desactivar' : 'Activar') + ' colonia ' + row.name
                    "
                  >
                    <div class="flex items-center justify-center gap-1">
                      <lucide-icon
                        [img]="row.isActive ? iconsService.disable : iconsService.active"
                        size="15"
                        [color]="row.isActive ? 'red' : 'green'"
                      ></lucide-icon>
                      <span class="hidden text-xs 2xl:inline">
                        {{ row.isActive ? 'Desactivar' : 'Activar' }}
                      </span>
                    </div>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <app-pagination
      [total]="coloniesService.totalColonies()"
      [pageFrom]="pageFrom()"
      [pageTo]="pageTo()"
      [canPrev]="canPrev()"
      [canNext]="canNext()"
      [currentLimit]="pagination().limit"
      (previousPage)="prevPage()"
      (nextPage)="nextPage()"
      (limitChange)="changeLimit($event)"
    />
  } @else {
    <app-empty-state />
  }

  <app-modal
    [isOpen]="mode() !== null"
    [title]="modalTitle()"
    [maxWidth]="'max-w-md'"
    [showActions]="true"
    [loading]="saving()"
    [confirmDisabled]="!isCreateFormValid()"
    confirmText="Crear"
    (close)="closeModal()"
    (cancel)="closeModal()"
    (confirm)="save()"
  >
    <form class="space-y-4" (submit)="$event.preventDefault()">
      <div>
        <label for="name" class="mb-2 block text-sm font-medium">Nombre</label>
        <input
          id="name"
          type="text"
          class="w-full rounded-xl border border-black/10 px-3 py-2"
          [value]="createForm().name"
          (input)="updateCreateFormName($event)"
          required
        />
      </div>
    </form>
  </app-modal>

  <app-modal
    [isOpen]="confirmingToggle()"
    [title]="toggleConfirmTitle()"
    [maxWidth]="'max-w-md'"
    [showActions]="true"
    confirmText="Confirmar"
    (close)="closeToggleConfirmation()"
    (cancel)="closeToggleConfirmation()"
    (confirm)="executeToggle()"
  >
    <p class="text-sm text-neutral-600">{{ toggleConfirmMessage() }}</p>
  </app-modal>
</div>
