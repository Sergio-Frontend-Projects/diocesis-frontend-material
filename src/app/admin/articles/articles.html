<div class="section-spacing">
  <div class="page-header">
    <app-title title="Artículos" description="Gestión de artículos" />

    <div class="actions-bar">
      <button class="btn-primary btn-full" (click)="openCreateArticle()">
        <div class="flex items-center justify-center gap-2">
          <lucide-icon
            [img]="iconsService.addInformation"
            size="15"
            color="black"
            aria-hidden="true"
          />
          <span>Crear Artículo</span>
        </div>
      </button>
    </div>
  </div>

  <div class="search-bar">
    <div class="flex items-center gap-2">
      <label for="search-articles-by-title" class="sr-only">Buscar artículos por título</label>
      <lucide-icon
        [img]="iconsService.search"
        size="15"
        color="black"
        aria-hidden="true"
      ></lucide-icon>
      <input
        id="search-articles-by-title"
        type="search"
        placeholder="Buscar por título..."
        [value]="searchTitle()"
        (input)="updateTitleSearch($event)"
        class="input-search"
        aria-label="Buscar por título"
      />
    </div>
    <div class="flex items-center gap-2">
      <label for="search-articles-by-tags" class="sr-only">Buscar artículos por etiquetas</label>
      <input
        id="search-articles-by-tags"
        type="search"
        placeholder="Buscar por etiquetas..."
        [value]="searchTags()"
        (input)="updateTagsSearch($event)"
        class="input-search"
        aria-label="Buscar por etiquetas"
      />
    </div>
    <select
      id="filter-status"
      [value]="activeFilterValue()"
      (change)="updateFilterActive($event)"
      class="select-full"
      aria-label="Filtrar por estado"
    >
      <option class="font-bold" value="">Todos</option>
      <option class="font-bold" value="true">Activos</option>
      <option class="font-bold" value="false">Inactivos</option>
    </select>
  </div>

  @if (articleService.articles().length > 0) {
    <div class="table-container overflow-x-auto">
      <table class="min-w-full table-auto">
        <thead class="bg-neutral-50 text-neutral-600">
          <tr>
            <th class="w-1/4 px-4 py-3 text-left font-bold">Título</th>
            <th class="w-1/4 px-4 py-3 text-left font-bold">Tags</th>
            <th class="w-1/6 px-4 py-3 text-left font-bold">Estado</th>
            <th class="w-1/6 px-4 py-3 text-right font-bold">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (row of articleService.articles(); track row.id) {
            <tr
              class="animate-fade-in animate-duration-300 hover:bg-custom-yellow/50 border-t border-black/5 transition-all"
            >
              <td class="w-1/4 truncate px-4 py-3" [title]="row.title">
                {{ row.title }}
              </td>
              <!-- Tags -->
              <td class="w-1/4 px-4 py-3">
                <div class="flex flex-wrap gap-2">
                  @for (tag of row.tags; track $index) {
                    <span
                      class="inline-block rounded-full bg-blue-100 px-2 py-1 text-xs font-bold text-blue-800"
                    >
                      {{ tag }}
                    </span>
                  }
                </div>
              </td>
              <td class="w-1/6 px-4 py-3">
                <div
                  class="inline-flex items-center gap-2 rounded-full border px-2 py-1 text-xs"
                  [class]="
                    row.isActive
                      ? 'border-green-200 bg-green-100 text-green-800'
                      : 'border-red-200 bg-red-100 text-red-800'
                  "
                >
                  <lucide-icon
                    [img]="row.isActive ? iconsService.active : iconsService.inactive"
                    size="20"
                    [color]="row.isActive ? 'green' : 'red'"
                  ></lucide-icon>

                  <span>
                    {{ row.isActive ? 'Activo' : 'Inactivo' }}
                  </span>
                </div>
              </td>
              <td class="w-1/6 px-4 py-3">
                <div class="flex flex-wrap items-center justify-end gap-2">
                  <!-- Editar -->
                  <button class="btn-table-warning" (click)="openEditArticle(row)">
                    <div class="flex items-center justify-center gap-1">
                      <lucide-icon [img]="iconsService.edit" size="15" />
                      <span class="hidden text-xs 2xl:inline"> Editar </span>
                    </div>
                  </button>
                  <!-- Desactivar -->
                  <button
                    class="btn-table"
                    [class]="
                      !row.isActive
                        ? 'border-green-200 bg-green-100 text-green-800'
                        : 'border-red-200 bg-red-100 text-red-800'
                    "
                    (click)="confirmToggleArticle(row, row.isActive ? 'deactivate' : 'activate')"
                    [attr.aria-label]="
                      (row.isActive ? 'Desactivar' : 'Activar') + ' artículo ' + row.title
                    "
                  >
                    <div class="flex items-center justify-center gap-1">
                      <lucide-icon
                        [img]="row.isActive ? iconsService.disable : iconsService.active"
                        size="15"
                        [color]="row.isActive ? 'red' : 'green'"
                      ></lucide-icon>
                      <span class="hidden text-xs 2xl:inline">
                        {{ row.isActive ? 'Desactivar' : 'Activar' }}
                      </span>
                    </div>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <app-pagination
      [total]="articleService.totalArticles()"
      [pageFrom]="pageFrom()"
      [pageTo]="pageTo()"
      [canPrev]="canPrev()"
      [canNext]="canNext()"
      [currentLimit]="pagination().limit"
      (previousPage)="prevPage()"
      (nextPage)="nextPage()"
      (limitChange)="changeLimit($event)"
    />
  } @else {
    <app-empty-state />
  }

  <app-modal
    [isOpen]="mode() !== null"
    [title]="modalTitle()"
    [maxWidth]="'max-w-xl'"
    [showActions]="true"
    [loading]="saving()"
    [confirmDisabled]="!isCreateFormValid()"
    [confirmText]="mode() === 'create' ? 'Crear' : 'Guardar'"
    (close)="closeModal()"
    (cancel)="closeModal()"
    (confirm)="save()"
  >
    <form class="max-h-[80vh] space-y-4 overflow-y-auto" (submit)="$event.preventDefault()">
      <div class="grid grid-cols-1 gap-4">
        <div>
          <div class="mb-2">
            <label for="title" class="mb-2 block text-sm font-medium">Título</label>
            <input
              id="title"
              type="text"
              class="w-full rounded-xl border border-black/10 px-3 py-2"
              [value]="createForm().title"
              (input)="updateCreateFormField('title', $event)"
              required
            />
          </div>

          <div>
            <label for="tags" class="mb-2 block text-sm font-medium">Etiquetas</label>
            <input
              id="tags"
              type="text"
              class="w-full rounded-xl border border-black/10 px-3 py-2"
              [value]="createForm().tags"
              (input)="updateCreateFormField('tags', $event)"
              placeholder="Ejemplo: noticia, evento, importante"
            />
          </div>

          <div>
            <label for="content" class="mb-2 block text-sm font-medium">Contenido</label>
            <textarea
              id="content"
              class="w-full rounded-xl border border-black/10 px-3 py-2"
              [value]="createForm().content"
              (input)="updateCreateFormField('content', $event)"
              rows="5"
              placeholder="Escribe el contenido de la noticia aquí..."
            ></textarea>
          </div>
        </div>
      </div>
    </form>
  </app-modal>

  <app-modal
    [isOpen]="confirmingToggle()"
    [title]="toggleConfirmTitle()"
    [maxWidth]="'max-w-md'"
    [showActions]="true"
    confirmText="Confirmar"
    (close)="closeToggleConfirmation()"
    (cancel)="closeToggleConfirmation()"
    (confirm)="executeToggle()"
  >
    <p class="text-sm text-neutral-600">{{ toggleConfirmMessage() }}</p>
  </app-modal>
</div>
